name: verify
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # lean-action installs elan, pulls the mathlib cache, and runs `lake build`.
      # See https://github.com/leanprover/lean-action for options.
      - uses: leanprover/lean-action@v1

      - name: Integrity check (no sorry / axiom / weakened goal)
        run: bash scripts/check_integrity.sh
